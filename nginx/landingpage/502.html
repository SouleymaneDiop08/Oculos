<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Talixman OT Security — Service indisponible</title>
  <link rel="icon" href="assets/X.ico" type="image/x-icon">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #6b1d3a;
      line-height: 1;
    }
    .title {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 16px 0 8px;
      color: #f0f4f8;
    }
    .sub {
      font-size: 0.95rem;
      color: #8faabe;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #6b1d3a;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover { background: #8a2449; }
    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="code">502</div>
  <div class="title">Service temporairement indisponible</div>
  <div class="sub">
    Le service demandé ne répond pas.<br>
    Il est peut-être encore en cours de démarrage.
  </div>
  <a href="/" class="btn">← Retour à l'accueil</a>
  <div class="footer">Talixman OT Security Platform</div>
</body>
</html>
