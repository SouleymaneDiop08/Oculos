location @auth_netbox {
    include /etc/nginx/nginx_auth_rt.conf;
    proxy_pass http://netbox;
    proxy_redirect off;
    include /etc/nginx/nginx_proxy_forward_headers.conf;
}

location /netbox/api {
  proxy_set_header X-Forwarded-User "";
  error_page 418 = @auth_netbox;
  if ($netbox_auth_redirect) {
      return 418;
  }
  proxy_pass http://netbox;
  proxy_redirect off;
  include /etc/nginx/nginx_proxy_forward_headers.conf;
  # ↑ Pas de sub_filter ici — c'est de l'API JSON, pas du HTML
}

location /netbox {
  include /etc/nginx/nginx_auth_rt.conf;
  proxy_pass http://netbox;
  proxy_redirect off;
  include /etc/nginx/nginx_proxy_forward_headers.conf;

  # ── Favicon + Titre Talixman ────────────────────────────────
  # Désactiver la compression pour autoriser sub_filter
  proxy_set_header Accept-Encoding "";
  sub_filter_once off;
  sub_filter_types text/html;

  # Remplacer le titre NetBox par le titre Talixman
  # NetBox génère des titres de la forme "Home | NetBox", "Devices | NetBox", etc.
  sub_filter '| NetBox</title>'
             '| Inventaire des actifs </title>';

  # Cas où le titre est juste "NetBox" sans pipe
  sub_filter '<title>NetBox</title>'
             '<title>Inventaire des actifs</title>';

  # Injecter le favicon Talixman dans le <head>
  sub_filter '</head>'
             '<link rel="icon" type="image/x-icon" href="/X.ico">
              <link rel="shortcut icon" href="/X.ico">
              </head>';
}

# netbox from dashboards pivot link
# (because Dashboards is prepending its own prefix, we have to handle it)
location ~* ^/dashboards/app/netbox/(.*) {
  set $forwarded_scheme $scheme;
  if ($http_x_forwarded_proto = 'https') {
      set $forwarded_scheme https;
  }
  rewrite ^/dashboards/app/netbox/(.*) $forwarded_scheme://$host/netbox/$1 redirect;
  proxy_pass http://netbox;
  proxy_redirect off;
  include /etc/nginx/nginx_proxy_forward_headers.conf;
  # ↑ Pas de sub_filter ici — c'est une redirection, pas une page HTML
}

# passthrough NetBox from the Malcolm API
location @auth_netbox_api {
  include /etc/nginx/nginx_auth_rt.conf;
  rewrite ^/mapi/netbox/api/(.*)$ /netbox/api/$1 break;
  rewrite ^/mapi/netbox/(.*)$ /netbox/api/$1 break;
  proxy_pass http://netbox;
  proxy_redirect off;
  include /etc/nginx/nginx_proxy_forward_headers.conf;
}

location /mapi/netbox/api/ {
  proxy_set_header X-Forwarded-User "";
  error_page 418 = @auth_netbox_api;
  if ($netbox_auth_redirect) {
      return 418;
  }
  proxy_pass http://netbox/netbox/api/;
  proxy_redirect off;
  include /etc/nginx/nginx_proxy_forward_headers.conf;
  # ↑ API REST JSON — pas de sub_filter
}

location /mapi/netbox/ {
  proxy_set_header X-Forwarded-User "";
  error_page 418 = @auth_netbox_api;
  if ($netbox_auth_redirect) {
      return 418;
  }
  proxy_pass http://netbox/netbox/api/;
  proxy_redirect off;
  include /etc/nginx/nginx_proxy_forward_headers.conf;
  # ↑ API REST JSON — pas de sub_filter
}