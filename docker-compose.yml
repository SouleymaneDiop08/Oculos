services:
  opensearch:
    image: suleymane08/oculos:opensearch
    # Technically the "hedgehog" profile doesn't have OpenSearch, but in that case
    #   OPENSEARCH_PRIMARY will be set to remote, which means the container will
    #   start but not actually run OpenSearch. It's included in both profiles to
    #   satisfy some other containers' depends_on.
    profiles: ["malcolm", "hedgehog"]
    logging:
      driver: local
      options:
        max-size: 200m
        max-file: 2
        compress: "false"
    restart: "no"
    stdin_open: false
    tty: true
    hostname: opensearch
    networks:
    - default
    env_file:
    - ./config/process.env
    - ./config/ssl.env
    - ./config/auth-common.env
    - ./config/opensearch.env
    ulimits:
      memlock:
        soft: -1
        hard: -1
    oom_score_adj: -500
    cap_add:
      # IPC_LOCK - to lock memory, preventing swapping
    - IPC_LOCK
      # SYS_RESOURCE - for increasing memlock limits
    - SYS_RESOURCE
    volumes:
    - type: bind
      bind:
        create_host_path: false
      source: ./nginx/ca-trust
      target: /var/local/ca-trust
      read_only: true
    - type: bind
      bind:
        create_host_path: false
      source: ./.opensearch.primary.curlrc
      target: /var/local/curlrc/.opensearch.primary.curlrc
      read_only: true
    - type: bind
      bind:
        create_host_path: false
      source: ./.opensearch.secondary.curlrc
      target: /var/local/curlrc/.opensearch.secondary.curlrc
      read_only: true
    - type: bind
      bind:
        create_host_path: false
      source: ./opensearch
      target: /usr/share/opensearch/data
    - type: bind
      bind:
        create_host_path: false
      source: ./opensearch-backup
      target: /opt/opensearch/backup
    - type: bind
      bind:
        create_host_path: false
      source: ./opensearch/opensearch.keystore
      target: /usr/share/opensearch/config/persist/opensearch.keystore
    healthcheck:
      test: ["CMD", "/usr/local/bin/container_health.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 180s
  dashboards-helper:
    image: suleymane08/oculos:dashboards-helper
    profiles: ["malcolm"]
    logging:
      driver: local
      options:
        max-size: 200m
        max-file: 2
        compress: "false"
    restart: "no"
    stdin_open: false
    tty: true
    hostname: dashboards-helper
    networks:
    - default
    env_file:
    - ./config/process.env
    - ./config/ssl.env
    - ./config/opensearch.env
    - ./config/netbox-common.env
    - ./config/dashboards.env
    - ./config/dashboards-helper.env
    depends_on:
    - opensearch
    volumes:
    - dashboards-helper-data-init:/data/init
    - type: bind
      bind:
        create_host_path: false
      source: ./nginx/ca-trust
      target: /var/local/ca-trust
      read_only: true
    - type: bind
      bind:
        create_host_path: false
      source: ./.opensearch.primary.curlrc
      target: /var/local/curlrc/.opensearch.primary.curlrc
      read_only: true
    - type: bind
      bind:
        create_host_path: false
      source: ./.opensearch.secondary.curlrc
      target: /var/local/curlrc/.opensearch.secondary.curlrc
      read_only: true
    healthcheck:
      test: ["CMD", "/usr/local/bin/container_health.sh"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
  dashboards:
    image: suleymane08/oculos:dashboards
    profiles: ["malcolm"]
    logging:
      driver: local
      options:
        max-size: 200m
        max-file: 2
        compress: "false"
    restart: "no"
    stdin_open: false
    tty: true
    hostname: dashboards
